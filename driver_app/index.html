<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EV Driver Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600&family=Barlow+Condensed:wght@700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#080c10;--bg2:#0d1117;--bg3:#141b24;--border:#1e2d3d;--accent:#00e5ff;--green:#39ff14;--orange:#ff6b35;--warn:#ffb700;--danger:#ff3b3b;--text:#c8d8e8;--dim:#6b8097;--mono:'Share Tech Mono',monospace;--cond:'Barlow Condensed',sans-serif;}
  body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1rem;}
  .scanline{position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.015) 2px,rgba(0,229,255,0.015) 4px);pointer-events:none;z-index:9999;}
  h1{font-family:var(--cond);letter-spacing:.15em;color:var(--accent);font-size:1.4rem;text-align:center;margin:1.5rem 0 0.25rem;}
  .sub{font-family:var(--mono);font-size:.6rem;color:var(--dim);letter-spacing:.2em;text-align:center;margin-bottom:1.5rem;}
  .card{background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1.25rem;width:100%;max-width:440px;margin-bottom:1rem;position:relative;overflow:hidden;}
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.5;}
  .label{font-family:var(--mono);font-size:.6rem;letter-spacing:.2em;color:var(--dim);text-transform:uppercase;margin-bottom:.5rem;}
  .vid{font-family:var(--cond);font-size:2rem;color:var(--accent);letter-spacing:.1em;}
  .big{font-family:var(--mono);font-size:3.5rem;line-height:1;}
  .unit{font-family:var(--mono);font-size:.75rem;color:var(--dim);margin-top:.25rem;}
  .bar-wrap{height:8px;background:var(--bg3);border-radius:4px;margin-top:.75rem;overflow:hidden;}
  .bar{height:100%;border-radius:4px;transition:width .5s,background .5s;}
  select{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:.5rem 1rem;font-family:var(--mono);font-size:.8rem;border-radius:2px;width:100%;max-width:440px;margin-bottom:1rem;}
  .row{display:flex;gap:1rem;width:100%;max-width:440px;}
  .row .card{flex:1;min-width:0;}
  .badge{display:inline-block;padding:.15rem .6rem;border-radius:2px;font-family:var(--mono);font-size:.7rem;}
  .ok{background:rgba(57,255,20,.1);color:var(--green);border:1px solid rgba(57,255,20,.3);}
  .warn{background:rgba(255,183,0,.1);color:var(--warn);border:1px solid rgba(255,183,0,.3);}
  .danger{background:rgba(255,59,59,.1);color:var(--danger);border:1px solid rgba(255,59,59,.3);}
  .station-card{background:rgba(255,183,0,.05);border-color:rgba(255,183,0,.3);}
  .station-card::before{background:linear-gradient(90deg,transparent,var(--warn),transparent);}
  .blink{animation:blink 1s step-end infinite;}
  @keyframes blink{50%{opacity:0}}
  .ts{font-family:var(--mono);font-size:.65rem;color:var(--dim);text-align:center;margin-top:.5rem;}
</style>
</head>
<body>
<div class="scanline"></div>
<h1>⚡ EV DRIVER DASHBOARD</h1>
<p class="sub">LAST MILE DELIVERY SYSTEM — DRIVER VIEW</p>

<select id="vehicleSelect" onchange="changeVehicle(this.value)">
  <option>EV001</option><option>EV002</option><option>EV003</option>
</select>

<div class="card">
  <div class="label">Vehicle ID</div>
  <div class="vid" id="vid">---</div>
  <div id="statusBadge" style="margin-top:.5rem;"></div>
</div>

<div class="row">
  <div class="card">
    <div class="label">⚡ Battery</div>
    <div class="big" id="battery" style="color:var(--green)">--</div>
    <div class="unit">PERCENT</div>
    <div class="bar-wrap"><div class="bar" id="battBar" style="width:0%;background:var(--green)"></div></div>
  </div>
  <div class="card">
    <div class="label">🌡 Temperature</div>
    <div class="big" id="temp" style="color:var(--orange)">--</div>
    <div class="unit">CELSIUS</div>
  </div>
</div>

<div class="card">
  <div class="label">📦 Assigned Delivery</div>
  <div style="font-size:1.4rem;color:var(--accent4,#c084fc);font-family:var(--cond);letter-spacing:.05em;" id="dest">Loading...</div>
</div>

<div class="card station-card" id="stationCard" style="display:none">
  <div class="label">⚡ CHARGING REQUIRED — Nearest Station</div>
  <div style="font-family:var(--mono);font-size:1.1rem;color:var(--warn);" id="stationName">--</div>
  <div style="font-family:var(--mono);font-size:.75rem;color:var(--dim);margin-top:.25rem;" id="stationDist">-- km away</div>
</div>

<p class="ts" id="ts">Last update: --</p>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8000' : 'http://backend:8000';
let currentVehicle = 'EV001';

function changeVehicle(v) { currentVehicle = v; fetchData(); }

function battColor(pct) {
  if (pct >= 50) return 'var(--green)';
  if (pct >= 25) return 'var(--warn)';
  return 'var(--danger)';
}

async function fetchData() {
  try {
    const [statusR, planR, stationR] = await Promise.all([
      fetch(`${API}/vehicles/status`).then(r=>r.json()),
      fetch(`${API}/fleet/delivery_plan`).then(r=>r.json()),
      fetch(`${API}/vehicles/nearest_station/${currentVehicle}`).then(r=>r.json()),
    ]);

    const vehicles = statusR.data || [];
    const v = vehicles.find(x => x.vehicle_id === currentVehicle);
    const plan = (planR.data || []).find(x => x.vehicle_id === currentVehicle);
    const station = stationR.data;

    if (v) {
      const pct = v.battery_percent;
      const col = battColor(pct);
      document.getElementById('vid').textContent = v.vehicle_id;
      document.getElementById('battery').textContent = pct.toFixed(1);
      document.getElementById('battery').style.color = col;
      document.getElementById('battBar').style.width = pct + '%';
      document.getElementById('battBar').style.background = col;
      document.getElementById('temp').textContent = v.temperature.toFixed(1);
      const badge = pct >= 50 ? 'ok' : pct >= 25 ? 'warn' : 'danger';
      const label = pct >= 50 ? 'OPERATIONAL' : pct >= 25 ? 'LOW BATTERY' : '⚠ CRITICAL';
      document.getElementById('statusBadge').innerHTML = `<span class="badge ${badge}">${label}</span>`;
    }

    if (plan) {
      document.getElementById('dest').textContent = plan.destination;
    }

    const sc = document.getElementById('stationCard');
    if (station && v && v.battery_percent < 40) {
      sc.style.display = 'block';
      document.getElementById('stationName').textContent = station.nearest_station;
      document.getElementById('stationDist').textContent = station.distance_km + ' km away';
    } else {
      sc.style.display = 'none';
    }

    document.getElementById('ts').textContent = 'Last update: ' + new Date().toLocaleTimeString();
  } catch(e) { console.error(e); }
}

fetchData();
setInterval(fetchData, 10000);
</script>
</body>
</html>
