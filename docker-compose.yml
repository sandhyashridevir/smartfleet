services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: evfleet
      POSTGRES_USER: evfleet
      POSTGRES_PASSWORD: evfleet
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/seed.sql:/docker-entrypoint-initdb.d/seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U evfleet -d evfleet"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://evfleet:evfleet@db:5432/evfleet
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  driver_app:
    build: ./driver_app
    ports:
      - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

  simulator:
    build:
      context: ./simulator
    environment:
      API_URL: http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
